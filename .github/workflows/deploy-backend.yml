name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        working-directory: server
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker tag  $REGISTRY/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest
          echo "image=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to ECS Express
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: ${{ secrets.ECS_SERVICE_NAME }}
          image: ${{ steps.build.outputs.image }}
          execution-role-arn: ${{ secrets.ECS_EXECUTION_ROLE_ARN }}
          infrastructure-role-arn: ${{ secrets.ECS_INFRASTRUCTURE_ROLE_ARN }}
          container-port: 8000
          health-check-path: /api/v1/health
          cpu: 512
          memory: 1024

      - name: Slack — success
        if: success()
        env:
          AUTHOR: ${{ github.event.head_commit.author.name }}
          MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \"✅ *lokam-devtool* backend deployed successfully\nAuthor: ${AUTHOR}\nCommit: ${MESSAGE}\"}" \
            ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK_URL }}

      - name: Slack — failure
        if: failure()
        env:
          AUTHOR: ${{ github.event.head_commit.author.name }}
          MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \"❌ *lokam-devtool* backend deployment failed\nAuthor: ${AUTHOR}\nCommit: ${MESSAGE}\nSee: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK_URL }}
